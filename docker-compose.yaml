# Coolify deployment — ZAH scraper as its OWN resource, scheduled nightly.
#
# One light container: runs a scrape on start (populates immediately), then once
# every 24h. The scraper's own RESCRAPE_AFTER_HOURS=12 skip-window means a re-run
# only re-fetches products not seen recently, so repeated runs are cheap.
#
# It joins the `coolify` network to reach BOTH the Postgres (yv1n67…) and the
# FlareSolverr container by name. No Chrome, no proxies baked in — all config is
# env (set in Coolify from .env.example). Postgres-only, no NocoDB.

services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: zah-scraper:latest
    restart: unless-stopped
    env_file:
      - .env
    # Proxy pool mounted from a host file (kept OFF this public repo). One
    # `http://user:pass@ip:port` per line. The scraper reads /app/proxies.txt.
    volumes:
      - /root/proxies.txt:/app/proxies.txt:ro
    networks:
      - coolify
    # scrape now, then nightly. Logs to stdout (Coolify captures them).
    command: >
      sh -c 'while true; do
        echo "=== scrape start $(date -u +%FT%TZ) ===";
        python -m src.scraper || echo "scrape exited $?";
        echo "=== sleeping 24h ===";
        sleep 86400;
      done'

networks:
  coolify:
    external: true
