name: Scrape Zahcomputers.pk

# NOTE: the daily cron schedule runs on the VPS, not here.
#
# Cloudflare's cf_clearance cookie is bound to the IP that solved the challenge,
# and our FlareSolverr instance shares the VPS's IP. A GitHub Actions runner has
# a different IP, so cookies returned to it are 403'd by Cloudflare. Daily runs
# are driven by zah-scraper.timer (systemd) on the VPS instead.
#
# This workflow is kept for: (1) reference, (2) manual smoke tests from a host
# whose IP matches the FlareSolverr instance — i.e. don't trigger it from
# GitHub-hosted runners.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-scrape (ignore the 12h skip)'
        type: boolean
        default: false
      scrape_limit:
        description: "Sample only N URLs (0 = full scrape; the cron schedule always runs at 0)"
        type: string
        default: '0'

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          NOCODB_BASE_URL: https://anchor.dacoders.com
          NOCODB_API_TOKEN: ${{ secrets.NOCODB_API_TOKEN }}
          # Pin the base id so a stale secret can't silently redirect the scrape
          # into the wrong base. The TODO placeholder is replaced by the
          # zahcomputers base id once it's been created (see README).
          NOCODB_BASE_ID: ${{ secrets.NOCODB_BASE_ID }}
          FLARESOLVERR_URL: ${{ secrets.FLARESOLVERR_URL }}
          SITEMAP_URL: https://zahcomputers.pk/sitemap_index.xml
          SITE_ORIGIN: https://zahcomputers.pk/
          CONCURRENCY: '2'
          REQUEST_DELAY_MS: '1500'
          # cron triggers carry no inputs -> the `|| '0'` ensures scheduled runs scrape everything.
          SCRAPE_LIMIT: ${{ inputs.scrape_limit || '0' }}
          RESCRAPE_AFTER_HOURS: '12'
          FORCE_RESCRAPE: ${{ inputs.force }}
        run: python -m src.scraper
